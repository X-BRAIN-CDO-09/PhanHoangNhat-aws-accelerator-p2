# Build, Scan (Trivy), Sign (Cosign) và Push Docker image lên ghcr.io
# Workflow này ở ROOT .github/workflows/ để GitHub Actions nhận diện
name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - 'cloud/w10/lab_day4/src/api/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Repository owner = X-BRAIN-CDO-09 hoặc override bằng github.actor
  IMAGE_NAME: ${{ github.repository_owner }}/w10-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write   # required for cosign

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.semver.outputs.version }}
            type=sha,prefix=v${{ steps.semver.outputs.version }}-

      # ─── Build local (no push) trước khi scan ───────────────────
      - name: Build Docker image (local only, no push)
        uses: docker/build-push-action@v6
        with:
          context: ./cloud/w10/lab_day4/src/api
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}

      # ─── PART 2: TRIVY SCAN ──────────────────────────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          output: trivy-results.txt

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.txt
          retention-days: 30

      # ─── Push sau khi Trivy pass ─────────────────────────────────
      - name: Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./cloud/w10/lab_day4/src/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ─── PART 3: COSIGN SIGN ─────────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign image with Cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          IMAGE_DIGEST=$(docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}" \
            --format '{{.Manifest.Digest}}')
          echo "Signing digest: $IMAGE_DIGEST"
          cosign sign --yes \
            --key env://COSIGN_PRIVATE_KEY \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
          echo "✅ Image signed"

      # ─── Update rollout.yaml với image mới ───────────────────────
      - name: Update rollout.yaml with new image
        run: |
          ROLLOUT_FILE="cloud/w10/lab_day4/app-api/rollout.yaml"
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}"
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${NEW_IMAGE}|g" "$ROLLOUT_FILE"
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" "$ROLLOUT_FILE"
          echo "Updated image to: $NEW_IMAGE"

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cloud/w10/lab_day4/app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump api image to v${{ steps.semver.outputs.version }}"
            git push
          fi

      - name: Create git tag
        run: |
          git tag v${{ steps.semver.outputs.version }} || true
          git push origin v${{ steps.semver.outputs.version }} || true
