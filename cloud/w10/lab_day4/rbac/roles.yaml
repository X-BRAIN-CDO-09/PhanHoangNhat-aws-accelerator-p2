apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: developer
  namespace: demo

rules:

- apiGroups:
  - ""

  resources:
  - pods
  - services

  verbs:
  - get
  - list
  - create
  - update
  - delete


- apiGroups:
  - apps

  resources:
  - deployments

  verbs:
  - get
  - list
  - create
  - update
  - delete

  apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole

metadata:
  name: sre


rules:

- apiGroups:
  - ""

  resources:
  - pods

  verbs:

  - get
  - list
  - watch
  - delete

apiVersion: rbac.authorization.k8s.io/v1

kind: ClusterRole


metadata:

  name: viewer


rules:


- apiGroups:

  - ""


  resources:

  - pods
  - services


  verbs:

  - get
  - list
  - watch