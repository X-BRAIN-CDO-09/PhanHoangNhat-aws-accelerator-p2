# ====Alice===

apiVersion: rbac.authorization.k8s.io/v1

kind: RoleBinding


metadata:

  name: alice-developer

  namespace: demo


subjects:

- kind: User

  name: alice


roleRef:

  kind: Role

  name: developer

  apiGroup: rbac.authorization.k8s.io

# ===Bob===

apiVersion: rbac.authorization.k8s.io/v1

kind: ClusterRoleBinding


metadata:

  name: bob-sre


subjects:

- kind: User

  name: bob


roleRef:

  kind: ClusterRole

  name: sre

  apiGroup: rbac.authorization.k8s.io

# ===Carol===

apiVersion: rbac.authorization.k8s.io/v1

kind: ClusterRoleBinding


metadata:

  name: carol-viewer


subjects:

- kind: User

  name: carol


roleRef:

  kind: ClusterRole

  name: viewer

  apiGroup: rbac.authorization.k8s.io