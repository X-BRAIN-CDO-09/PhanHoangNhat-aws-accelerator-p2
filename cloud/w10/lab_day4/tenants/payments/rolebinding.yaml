apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: payments-dev
  namespace: payments

subjects:
- kind: User
  name: payments-dev

- kind: ServiceAccount
  name: payments-sa
  namespace: payments

roleRef:
  kind: Role
  name: payments-dev
  apiGroup: rbac.authorization.k8s.io