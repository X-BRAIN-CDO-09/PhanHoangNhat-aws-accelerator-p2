# SecretStore: Kết nối ESO với AWS Secrets Manager
# Provider: AWS Secrets Manager, region ap-southeast-1
# Auth: dùng secretRef trỏ tới K8s Secret chứa AWS credentials (local/minikube)
#
# Tạo credential secret TRƯỚC KHI apply file này:
#   kubectl create secret generic aws-creds \
#     --from-literal=access-key=YOUR_AWS_ACCESS_KEY_ID \
#     --from-literal=secret-access-key=YOUR_AWS_SECRET_ACCESS_KEY \
#     -n demo
#
# KHÔNG commit file aws-creds lên git!
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-creds
            key: access-key
          secretAccessKeySecretRef:
            name: aws-creds
            key: secret-access-key
