# ExternalSecret: Đọc secret từ AWS Secrets Manager và tạo K8s Secret
# refreshInterval: 1m → ESO sẽ tự sync mỗi phút
# Mapping: AWS path "demo/db/password" → K8s secret "db-secret" key "password"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: password       # Key trong K8s Secret
      remoteRef:
        key: demo/db/password   # Secret path trong AWS Secrets Manager
        property: password      # JSON field nếu secret là JSON, bỏ dòng này nếu plain text
