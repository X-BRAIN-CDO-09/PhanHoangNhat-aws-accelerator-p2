apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequireownerlabel
spec:
  crd:
    spec:
      names:
        kind: K8sRequireOwnerLabel
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequireownerlabel

        violation[{"msg": msg}] {
          not input.review.object.metadata.labels["owner"]
          msg := "You must provide an 'owner' label."
        }
